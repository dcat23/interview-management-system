spring:
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        show_sql: false
  flyway:
    enabled: true
  cache:
    type: redis
jwt:
  secret: test-secret-key-that-is-long-enough-for-hs256-algorithm-minimum
  issuer: api
  expiration: PT1H
  security:
    public-paths:
      - /auth/login
      - /auth/refresh
      - /actuator/health/**
      - /swagger-ui/**
      - /v3/api-docs/**
      - /error/**
